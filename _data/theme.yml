##########
# CollectionBuilder Theme Customization
# values set here help configure details of individual pages in the website
##########

##########
# HOME PAGE
#
featured-image: assets/img/background.jpg
home-title-y-padding: 5em
home-banner-image-position: center

##########
# ITEM PAGE
#
browse-buttons: true

##########
# SUBJECTS PAGE
#
subjects-fields: subject;creator
subjects-min: 1
subjects-stopwords:

##########
# LOCATIONS PAGE
#
locations-fields: location
locations-min: 1
locations-stopwords:

##########
# MAP PAGE
#
auto-center-map: true
latitude: 46.727485
longitude: -117.014185
zoom-level: 5
map-base: Esri_WorldStreetMap
map-search: true
map-search-fuzziness: 0.35
map-cluster: true
map-cluster-radius: 25

##########
# TIMELINE PAGE
#
year-navigation:
year-nav-increment: 5

##########
# DATA 
#
metadata-export-fields: "title,eser_adi,telif_tarih_miladi,muellif_olum_tarihi,padisah_donemi,eser_alt_turu,kutupane_koleksiyon"
metadata-facets-fields: "muellif_adi,padisah_donemi,eser_alt_turu,kutupane_koleksiyon"

##########
# COMPOUND OBJECTS
#
map-child-objects: true
timeline-child-objects: true
data-child-objects: false
carousel-child-objects: false
browse-child-objects: false
search-child-objects: true

##########
# ADVANCED OPTIONS
#
navbar-color: navbar-dark
navbar-background: bg-dark
bootswatch:
base-font-size: 1.2em
text-color: "#191919"
link-color: "#0d6efd"
base-font-family:
font-cdn:
