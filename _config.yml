##########
# collectionbuilder-gh
# Jekyll Digital Collection Generator, designed for GitHub Pages
# https://github.com/CollectionBuilder/collectionbuilder-gh
##########
##########
# URL VARIABLES [optional if using GitHub Pages!]
#
# url is site domain, full URL to the production location of your collection
# on GitHub Pages follows the pattern username.github.io
#url: https://collectionbuilder.github.io 
# baseurl is path to location on the domain if necessary e.g. /digital/hjccc
# on GitHub Pages it is your github repository's name prefixed with a /
#baseurl: /Tevarih-Bursali
# location of code, the full url to your github repository
source-code: https://github.com/ays-aay/M.Tahir
##########
# SITE SETTINGS
#
title: Tevârih-II
tagline: Bursalı Mehmed Tâhir'in Osmanlı Müellifleri'nin 3. Cildini temel alan Dijital Envanter
description: "Tevârih-II, Bursalı Mehmed Tâhir'in Osmanlı Müellifleri adlı eserinin 3. cildini temel alan dijital bir katalog çalışmasıdır. Koleksiyon, eserde yer alan müellifler ve eserlerine ilişkin verileri bir araya getirmektedir."
author: ays-aay
##########
# COLLECTION SETTINGS
#
metadata: tahir_cb
##########
# Site/Organization Branding 
#
organization-name: "Marmara Üniversitesi Dijital Beşeri Bilimler Araştırma Merkezi"
organization-link: https://dbb.marmara.edu.tr/
# organization-logo-nav: /assets/img/logo.png
##########
# ROBOTS EXCLUDE
#
# noindex: true 
##########
# BUILD SETTINGS 
#
exclude: [docs/, Rakefile, README.md, LICENSE, CITATION.cff, CODE_OF_CONDUCT.md, CONTRIBUTING.md]
sass:
  style: compressed
